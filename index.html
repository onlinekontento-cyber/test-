<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מציאת המידה שלך</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f3ef;
      --white: #ffffff;
      --black: #1a1a1a;
      --gray: #6b6b6b;
      --border: #e0ddd8;
      --accent: #1a1a1a;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    body {
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      background: var(--cream);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .quiz-shell {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
      overflow: hidden;
      position: relative;
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: var(--border);
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: var(--black);
      transition: width 0.4s ease;
    }

    /* Header nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
    }
    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      transition: opacity var(--transition);
    }
    .nav-btn:hover { opacity: 1; }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.hidden { visibility: hidden; }

    /* Step content */
    .step {
      display: none;
      padding: 28px 24px 32px;
    }
    .step.active { display: block; }

    .step-title {
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 6px;
      color: var(--black);
    }
    .step-sub {
      font-size: 14px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Unit toggle */
    .unit-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      gap: 6px;
    }
    .toggle-switch {
      position: relative;
      width: 120px;
      height: 36px;
      background: #ece9e4;
      border-radius: 18px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-thumb {
      position: absolute;
      top: 4px;
      width: 56px;
      height: 28px;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      transition: transform var(--transition);
      right: 4px;
    }
    .toggle-switch.cm .toggle-thumb {
      transform: translateX(calc(-120px + 56px + 8px));
    }
    .toggle-labels {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
    }
    .toggle-labels span {
      flex: 1;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
      color: var(--gray);
      transition: color var(--transition);
    }
    .toggle-switch .toggle-labels span:last-child { color: var(--gray); }
    .toggle-switch .toggle-labels span:first-child { color: var(--black); }
    .toggle-switch.cm .toggle-labels span:first-child { color: var(--gray); }
    .toggle-switch.cm .toggle-labels span:last-child { color: var(--black); }

    /* Radio list */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .options-list::-webkit-scrollbar { width: 4px; }
    .options-list::-webkit-scrollbar-track { background: transparent; }
    .options-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .option-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      user-select: none;
    }
    .option-item:hover { border-color: #bbb; }
    .option-item.selected {
      border-color: var(--black);
      background: #faf9f7;
    }
    .radio-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition);
    }
    .option-item.selected .radio-circle {
      border-color: var(--black);
    }
    .radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--black);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .option-item.selected .radio-dot { opacity: 1; }
    .option-label { font-size: 15px; font-weight: 400; }

    /* Grid (for bra band/cup) */
    .grid-label {
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      color: var(--gray);
      margin-bottom: 12px;
    }
    .options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .grid-item {
      padding: 10px 0;
      width: calc((100% - 8px * 4) / 5);
      min-width: 52px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      user-select: none;
    }
    .grid-item:hover { border-color: #bbb; }
    .grid-item.selected {
      border-color: var(--black);
      background: var(--black);
      color: var(--white);
    }

    /* Continue button */
    .btn-continue {
      width: 100%;
      padding: 16px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      letter-spacing: 0.3px;
      transition: opacity var(--transition);
    }
    .btn-continue:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .btn-continue:not(:disabled):hover { opacity: 0.85; }

    /* Result step */
    .result-card {
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      background: #faf9f7;
      margin-bottom: 24px;
    }
    .result-size-label {
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 8px;
    }
    .result-size {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .result-size-full {
      font-size: 15px;
      color: var(--gray);
    }

    .result-details {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--cream);
      border-radius: 10px;
      font-size: 14px;
    }
    .result-row span:first-child { color: var(--gray); }
    .result-row span:last-child { font-weight: 600; }

    .btn-restart {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--black);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .btn-restart:hover { border-color: var(--black); }

    /* Step counter */
    .step-counter {
      font-size: 12px;
      color: var(--gray);
      text-align: center;
    }

    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; }
      .quiz-shell { border-radius: 0; min-height: 100vh; box-shadow: none; }
      .grid-item { min-width: 46px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div class="quiz-shell">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="nav">
    <button class="nav-btn hidden" id="backBtn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="step-counter" id="stepCounter"></span>
    <button class="nav-btn" id="closeBtn" onclick="closeQuiz()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Step 1: Height -->
  <div class="step active" id="step-1">
    <h2 class="step-title">מה הגובה שלך?</h2>
    <div class="unit-toggle">
      <div class="toggle-switch" id="heightToggle" onclick="toggleUnit('height')">
        <div class="toggle-thumb"></div>
        <div class="toggle-labels">
          <span>ס"מ</span>
          <span>אינץ'</span>
        </div>
      </div>
    </div>
    <div class="options-list" id="heightOptions"></div>
    <button class="btn-continue" id="heightBtn" disabled onclick="goNext()">המשך</button>
  </div>

  <!-- Step 2: Waist -->
  <div class="step" id="step-2">
    <h2 class="step-title">מה היקף המותניים שלך?</h2>
    <div class="unit-toggle">
      <div class="toggle-switch" id="waistToggle" onclick="toggleUnit('waist')">
        <div class="toggle-thumb"></div>
        <div class="toggle-labels">
          <span>ס"מ</span>
          <span>אינץ'</span>
        </div>
      </div>
    </div>
    <div class="options-list" id="waistOptions"></div>
    <button class="btn-continue" id="waistBtn" disabled onclick="goNext()">המשך</button>
  </div>

  <!-- Step 3: Bust -->
  <div class="step" id="step-3">
    <h2 class="step-title">מה היקף החזה שלך?</h2>
    <div class="unit-toggle">
      <div class="toggle-switch" id="bustToggle" onclick="toggleUnit('bust')">
        <div class="toggle-thumb"></div>
        <div class="toggle-labels">
          <span>ס"מ</span>
          <span>אינץ'</span>
        </div>
      </div>
    </div>
    <div class="options-list" id="bustOptions"></div>
    <button class="btn-continue" id="bustBtn" disabled onclick="goNext()">המשך</button>
  </div>

  <!-- Step 4: Dress size -->
  <div class="step" id="step-4">
    <h2 class="step-title">מה מידת השמלה שלך?</h2>
    <p class="step-sub">מידות EU</p>
    <div class="options-list" id="dressOptions"></div>
    <button class="btn-continue" id="dressBtn" disabled onclick="goNext()">המשך</button>
  </div>

  <!-- Step 5: Bra size -->
  <div class="step" id="step-5">
    <h2 class="step-title">מה מידת החזייה שלך?</h2>
    <p class="step-sub">זה עוזר לנו להבין את צורת גופך טוב יותר</p>

    <p class="grid-label">מידת גב (EU)</p>
    <div class="options-grid" id="bandOptions"></div>

    <p class="grid-label">מידת כוס</p>
    <div class="options-grid" id="cupOptions"></div>

    <button class="btn-continue" id="braBtn" disabled onclick="goNext()">המשך</button>
  </div>

  <!-- Step 6: Result -->
  <div class="step" id="step-6">
    <h2 class="step-title">המידה המומלצת שלך</h2>
    <p class="step-sub">בהתאם לפרטים שמסרת</p>

    <div class="result-card">
      <p class="result-size-label">המידה שלך</p>
      <div class="result-size" id="resultSize">M</div>
      <div class="result-size-full" id="resultSizeFull">Medium</div>
    </div>

    <div class="result-details" id="resultDetails"></div>

    <button class="btn-restart" onclick="restart()">התחל מחדש</button>
  </div>
</div>

<script>
const TOTAL_STEPS = 6;
let currentStep = 1;

const answers = {
  height: null,   // cm value
  waist: null,    // cm value
  bust: null,     // cm value
  dress: null,    // EU number
  band: null,     // band number
  cup: null       // cup letter
};

const units = { height: 'cm', waist: 'cm', bust: 'cm' };

// ---- Data ----
const heightCM = [
  { label: '150 ס"מ ומטה', value: 148 },
  { label: '155 ס"מ', value: 155 },
  { label: '157 ס"מ', value: 157 },
  { label: '160 ס"מ', value: 160 },
  { label: '163 ס"מ', value: 163 },
  { label: '165 ס"מ', value: 165 },
  { label: '168 ס"מ', value: 168 },
  { label: '170 ס"מ', value: 170 },
  { label: '173 ס"מ', value: 173 },
  { label: '175 ס"מ', value: 175 },
  { label: '178 ס"מ', value: 178 },
  { label: '180 ס"מ ומעלה', value: 182 },
];
const heightIN = [
  { label: '4\'11" ומטה', value: 148 },
  { label: '5\'1"', value: 155 },
  { label: '5\'2"', value: 157 },
  { label: '5\'3"', value: 160 },
  { label: '5\'4"', value: 163 },
  { label: '5\'5"', value: 165 },
  { label: '5\'6"', value: 168 },
  { label: '5\'7"', value: 170 },
  { label: '5\'8"', value: 173 },
  { label: '5\'9"', value: 175 },
  { label: '5\'10"', value: 178 },
  { label: '5\'11" ומעלה', value: 182 },
];

const waistCM = [
  { label: '58 ס"מ ומטה', value: 57 },
  { label: '61 ס"מ', value: 61 },
  { label: '64 ס"מ', value: 64 },
  { label: '66 ס"מ', value: 66 },
  { label: '69 ס"מ', value: 69 },
  { label: '71 ס"מ', value: 71 },
  { label: '74 ס"מ', value: 74 },
  { label: '76 ס"מ', value: 76 },
  { label: '79 ס"מ', value: 79 },
  { label: '81 ס"מ', value: 81 },
  { label: '84 ס"מ ומעלה', value: 85 },
];
const waistIN = [
  { label: '23" ומטה', value: 57 },
  { label: '24"', value: 61 },
  { label: '25"', value: 64 },
  { label: '26"', value: 66 },
  { label: '27"', value: 69 },
  { label: '28"', value: 71 },
  { label: '29"', value: 74 },
  { label: '30"', value: 76 },
  { label: '31"', value: 79 },
  { label: '32"', value: 81 },
  { label: '33" ומעלה', value: 85 },
];

const bustCM = [
  { label: '76 ס"מ ומטה', value: 75 },
  { label: '79 ס"מ', value: 79 },
  { label: '81 ס"מ', value: 81 },
  { label: '84 ס"מ', value: 84 },
  { label: '86 ס"מ', value: 86 },
  { label: '89 ס"מ', value: 89 },
  { label: '91 ס"מ', value: 91 },
  { label: '94 ס"מ', value: 94 },
  { label: '97 ס"מ', value: 97 },
  { label: '99 ס"מ', value: 99 },
  { label: '102 ס"מ ומעלה', value: 103 },
];
const bustIN = [
  { label: '30" ומטה', value: 75 },
  { label: '31"', value: 79 },
  { label: '32"', value: 81 },
  { label: '33"', value: 84 },
  { label: '34"', value: 86 },
  { label: '35"', value: 89 },
  { label: '36"', value: 91 },
  { label: '37"', value: 94 },
  { label: '38"', value: 97 },
  { label: '39"', value: 99 },
  { label: '40" ומעלה', value: 103 },
];

const dressSizes = [32, 34, 36, 38, 40, 42, 44, 46, 48, 50];
const bandSizes  = [65, 70, 75, 80, 85, 90, 95, 100, 105, 110];
const cupSizes   = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];

// ---- Size recommendation logic ----
function calcSize() {
  const d = answers.dress;
  const w = answers.waist; // cm
  const b = answers.bust;  // cm

  // Primary signal: dress size
  let score = 0;
  if (d <= 34) score = 1;
  else if (d <= 36) score = 2;
  else if (d <= 40) score = 3;
  else if (d <= 44) score = 4;
  else score = 5;

  // Secondary: waist and bust as tiebreakers
  const bodySignal = (w + b) / 2;
  if (bodySignal < 68) score = Math.max(1, score - 0.5);
  else if (bodySignal >= 90) score = Math.min(5, score + 0.5);

  const rounded = Math.round(score);
  const map = { 1: 'XS', 2: 'S', 3: 'M', 4: 'L', 5: 'XL' };
  const full = { XS: 'Extra Small', S: 'Small', M: 'Medium', L: 'Large', XL: 'Extra Large' };
  const s = map[Math.min(5, Math.max(1, rounded))];
  return { code: s, full: full[s] };
}

// ---- Rendering ----
function renderList(containerId, items, key, btnId) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'option-item' + (answers[key] === item.value ? ' selected' : '');
    div.innerHTML = `
      <div class="radio-circle"><div class="radio-dot"></div></div>
      <span class="option-label">${item.label}</span>`;
    div.onclick = () => {
      answers[key] = item.value;
      el.querySelectorAll('.option-item').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      document.getElementById(btnId).disabled = false;
    };
    el.appendChild(div);
  });
}

function renderDressList() {
  const el = document.getElementById('dressOptions');
  el.innerHTML = '';
  dressSizes.forEach(size => {
    const div = document.createElement('div');
    div.className = 'option-item' + (answers.dress === size ? ' selected' : '');
    div.innerHTML = `
      <div class="radio-circle"><div class="radio-dot"></div></div>
      <span class="option-label">${size}</span>`;
    div.onclick = () => {
      answers.dress = size;
      el.querySelectorAll('.option-item').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      document.getElementById('dressBtn').disabled = false;
    };
    el.appendChild(div);
  });
}

function renderGrid(containerId, items, key) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'grid-item' + (answers[key] === item ? ' selected' : '');
    div.textContent = item;
    div.onclick = () => {
      answers[key] = item;
      el.querySelectorAll('.grid-item').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      checkBraComplete();
    };
    el.appendChild(div);
  });
}

function checkBraComplete() {
  document.getElementById('braBtn').disabled = !(answers.band && answers.cup);
}

function renderResult() {
  const size = calcSize();
  document.getElementById('resultSize').textContent = size.code;
  document.getElementById('resultSizeFull').textContent = size.full;

  const heightLabel = (units.height === 'cm')
    ? `${answers.height} ס"מ`
    : heightIN.find(h => h.value === answers.height)?.label || `${answers.height}`;

  const waistLabel = (units.waist === 'cm')
    ? `${answers.waist} ס"מ`
    : waistIN.find(w => w.value === answers.waist)?.label || `${answers.waist}`;

  const bustLabel = (units.bust === 'cm')
    ? `${answers.bust} ס"מ`
    : bustIN.find(b => b.value === answers.bust)?.label || `${answers.bust}`;

  const details = [
    { label: 'גובה',           val: heightLabel },
    { label: 'היקף מותניים',   val: waistLabel },
    { label: 'היקף חזה',       val: bustLabel },
    { label: 'מידת שמלה (EU)', val: answers.dress },
    { label: 'חזייה',          val: `${answers.band} / ${answers.cup}` },
  ];

  const el = document.getElementById('resultDetails');
  el.innerHTML = details.map(d => `
    <div class="result-row">
      <span>${d.label}</span>
      <span>${d.val}</span>
    </div>`).join('');
}

// ---- Unit toggle ----
function toggleUnit(type) {
  units[type] = units[type] === 'cm' ? 'in' : 'cm';
  document.getElementById(type + 'Toggle').classList.toggle('cm', units[type] === 'cm');
  answers[type] = null;

  const configs = {
    height: { listId: 'heightOptions', cm: heightCM, in: heightIN, btnId: 'heightBtn' },
    waist:  { listId: 'waistOptions',  cm: waistCM,  in: waistIN,  btnId: 'waistBtn'  },
    bust:   { listId: 'bustOptions',   cm: bustCM,   in: bustIN,   btnId: 'bustBtn'   },
  };
  const c = configs[type];
  renderList(c.listId, units[type] === 'cm' ? c.cm : c.in, type, c.btnId);
  document.getElementById(c.btnId).disabled = true;
}

// ---- Navigation ----
function goNext() {
  if (currentStep < TOTAL_STEPS) showStep(currentStep + 1);
}
function goBack() {
  if (currentStep > 1) showStep(currentStep - 1);
}
function showStep(n) {
  document.getElementById('step-' + currentStep).classList.remove('active');
  currentStep = n;
  document.getElementById('step-' + currentStep).classList.add('active');

  if (currentStep === TOTAL_STEPS) renderResult();

  const pct = ((currentStep - 1) / (TOTAL_STEPS - 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('backBtn').classList.toggle(
    'hidden', currentStep === 1 || currentStep === TOTAL_STEPS
  );

  document.getElementById('stepCounter').textContent = currentStep < TOTAL_STEPS
    ? `שלב ${currentStep} מתוך ${TOTAL_STEPS - 1}`
    : '';
}
function closeQuiz() {
  if (confirm('לצאת ממציאת המידה?')) restart();
}
function restart() {
  Object.keys(answers).forEach(k => answers[k] = null);
  units.height = 'cm'; units.waist = 'cm'; units.bust = 'cm';
  init();
  showStep(1);
}

// ---- Init ----
function init() {
  document.getElementById('heightToggle').classList.remove('cm');
  renderList('heightOptions', heightCM, 'height', 'heightBtn');
  document.getElementById('heightBtn').disabled = true;

  document.getElementById('waistToggle').classList.remove('cm');
  renderList('waistOptions', waistCM, 'waist', 'waistBtn');
  document.getElementById('waistBtn').disabled = true;

  document.getElementById('bustToggle').classList.remove('cm');
  renderList('bustOptions', bustCM, 'bust', 'bustBtn');
  document.getElementById('bustBtn').disabled = true;

  renderDressList();
  document.getElementById('dressBtn').disabled = true;

  renderGrid('bandOptions', bandSizes, 'band');
  renderGrid('cupOptions', cupSizes, 'cup');
  document.getElementById('braBtn').disabled = true;

  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('stepCounter').textContent = `שלב 1 מתוך ${TOTAL_STEPS - 1}`;
  document.getElementById('backBtn').classList.add('hidden');
}

init();
</script>
</body>
</html>
